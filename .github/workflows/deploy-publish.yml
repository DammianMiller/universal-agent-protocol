name: Build, Test & Publish to NPM

on:
  push:
    branches: [main, master]
    tags-ignore: ['**'] # Ignore tag pushes (handled by release job)

  pull_request:
    branches: [main, master]

  workflow_dispatch:
    inputs:
      publish_to_npm:
        description: 'Publish to npm registry'
        required: false
        default: true
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  build-test-npm-publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Get package version
        id: get_version
        run: echo "VERSION=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Check if version exists on NPM
        id: check_npm
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          EXISTING_VERSION=$(npm view @miller-tech/uap@$VERSION version 2>/dev/null || echo "")
          if [ -n "$EXISTING_VERSION" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already exists on NPM registry"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION not yet published to NPM"
          fi

      - name: Publish to NPM (if version doesn't exist)
        if: steps.check_npm.outputs.exists == 'false' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master')
        run: |
          echo "Publishing @miller-tech/uap@${{ steps.get_version.outputs.VERSION }} to NPM..."
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Output publication status
        if: always()
        run: |
          echo "### Publication Status" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** @miller-tech/uap" >> $GITHUB_STEP_SUMMARY  
          echo "**Version:** v${{ steps.get_version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_npm.outputs.exists }}" == "true" ]; then
            echo "**Status:** Already published (skipped)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** Published successfully to https://www.npmjs.com/package/@miller-tech/uap" >> $GITHUB_STEP_SUMMARY
          fi

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-test-npm-publish

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get package version
        id: get_version
        run: echo "VERSION=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          if git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT  
            echo "Creating tag for first release of version..."
          fi

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## @miller-tech/uap v${{ steps.get_version.outputs.VERSION }}

            See [CHANGELOG.md](https://github.com/DammianMiller/universal-agent-protocol/blob/master/CHANGELOG.md) for details.

          draft: false
          prerelease: false

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
