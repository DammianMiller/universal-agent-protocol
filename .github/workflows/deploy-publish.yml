name: Build, Publish & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Dry run (validate publish without actually publishing)'
        required: false
        default: false
        type: boolean
      version:
        description: 'Version bump type (patch, minor, major)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  NODE_VERSION: '20'

permissions:
  contents: write
  packages: write
  id-token: write
  pages: write
  deployments: write

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-test
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check NPM_TOKEN
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error::NPM_TOKEN secret is not set. Please add it in repository Settings > Secrets and variables > Actions"
            exit 1
          fi

      - name: Dry run
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "Dry run mode - checking package configuration..."
          npm pack --dry-run
          echo "Dry run passed - package is valid"

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Output version
        run: |
          echo "Published version ${{ needs.build-test.outputs.version }}"
          echo "npm package: https://www.npmjs.com/package/universal-agent-protocol/v/${{ needs.build-test.outputs.version }}"

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-test, publish-npm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-test.outputs.version }}
          name: Release v${{ needs.build-test.outputs.version }}
          body: |
            Automated release from master branch

            ### Changes
            ${{ github.event.head_commit.message }}

            ### Commit
            ${{ github.sha }}

            ### Author
            ${{ github.event.head_commit.author.name }}

          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create documentation site
        run: |
          mkdir -p _site/docs
          cp -r docs/* _site/docs/ 2>/dev/null || true
          cp README.md _site/ 2>/dev/null || true

          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Universal Agent Memory - Documentation</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                max-width: 800px;
                margin: 0 auto;
                padding: 40px 20px;
                line-height: 1.6;
              }
              h1 { color: #2c3e50; }
              a { color: #3498db; }
              .card {
                background: #f8f9fa;
                border-radius: 8px;
                padding: 20px;
                margin: 20px 0;
              }
            </style>
          </head>
          <body>
            <h1>Universal Agent Memory</h1>
            <div class="card">
              <h2>Documentation</h2>
              <p><a href="docs/">View full documentation</a></p>
            </div>
            <div class="card">
              <h2>Quick Start</h2>
              <pre><code>npm install universal-agent-protocol
              uap init</code></pre>
            </div>
          </body>
          </html>
          HTMLEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
