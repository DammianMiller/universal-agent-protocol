# Harbor Job Configuration for Container-Based Testing
name: uap-qwen35-container-benchmark
datasets:
  - name: terminal-bench@2.0
    tasks:
      - git-recovery-test
      - tls-certificate-setup
agents:
  - name: uap-v3.0+
    type: installed_agent
    import_path: tools.agents.uap_agent:UAPAgent
trial_config:
  timeout_multiplier: 3.0
job_settings:
  n_concurrent: 1
  max_retries: 2
output_dir: results/harbor-container-benchmark
