# Qwen3.5 + latest UAP+OpenCode - Harbor quick benchmark
# 10-task smoke suite using the local OpenAI-compatible endpoint

name: qwen35-uap-quick-suite-v1
datasets:
  - registry:
      url: https://raw.githubusercontent.com/laude-institute/harbor/main/registry.json
    name: terminal-bench
    version: "2.0"
    tasks:
      - remember-file-locations
      - apply-pattern-memory
      - cross-task-context
      - multistep-coordination
      - apply-eslint
      - add-unit-tests
      - optimize-imports
      - password-recovery
      - file-permissions
      - extract-elf

agents:
  - name: opencode-uap-qwen35
    type: installed_agent
    import_path: tools.agents.opencode_uap_agent:OpenCodeUAP
    model_name: qwen-proxy/qwen35-a3b-iq4xs
    kwargs:
      api_endpoint: http://192.168.1.165:4000/v1

trial_config:
  timeout_multiplier: 1.5

job_settings:
  n_concurrent: 1
  max_retries: 2
  disable_verification: false

environment:
  type: docker
  override_cpus: 2
  override_memory_mb: 4096
  override_storage_mb: 1024

output_dir: benchmark-results/qwen35_harbor_uap_quick_suite

environment_variables:
  USE_UAP: 'true'
  PROJECT_ROOT: '/home/cogtek/dev/miller-tech/universal-agent-protocol'
  UAP_MEMORY_ENABLED: 'true'
  UAP_PATTERNS_RAG_ENABLED: 'true'
  QDRANT_ENDPOINT: 'localhost:6333'
  UAP_LOCAL_PROJECT: '/home/cogtek/dev/miller-tech/universal-agent-protocol'
  UAP_LOCAL_PATH: '/uap-local'
  OPENCODE_DISABLE_AUTOUPDATE: '1'

traces_config:
  export_traces: true
  sharegpt_export: false

retry_policy:
  retry_on_exceptions:
    - AgentTimeoutError
    - VerifierOutputParseError

max_concurrent_trials: 1

